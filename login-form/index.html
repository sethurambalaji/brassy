<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-form</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <!-- Form Container -->
     <div class="form-container">
        <h1>Login Form</h1>

        <div>
            <div class="login-buttons">
                <input type="button" id="login-button" value="Login">
                <input type="button" id="signup-button" value="Sign up" disabled>
            </div>
        </div>

        <div class="input-container">
            <input type="email" id="email-input" placeholder="Email Address" required>
            <input type="password" id="password-input" placeholder="Password" required>
        </div>

        <div class="forgot-password-container">
            <a href="" class="forgot-password">Forgot password?</a>
        </div>

        <div class="login-submit-container">
            <input type="submit" id="login-submit" value="Login">
        </div>

        <div class="signup-link-container">
            <p>Not a member? <a href="" class="signup-now-link" value="Signup now"></a> </p>
        </div>
     </div>


</body>
</html>
